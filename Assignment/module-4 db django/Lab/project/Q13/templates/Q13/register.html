<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6fb; margin: 0; padding: 2rem; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
    h1 { margin-top: 0; }
    form { display: flex; flex-direction: column; }
    label { margin-top: 1rem; font-weight: 600; }
    input { padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #d1d5db; }
    button { margin-top: 1.5rem; padding: 0.75rem; border: none; border-radius: 0.5rem; background: #3b82f6; color: white; font-weight: 600; cursor: pointer; }
    button:hover { background: #2563eb; }
    .message { margin-top: 1rem; padding: 0.75rem; border-radius: 0.5rem; background: #e0f2fe; color: #0369a1; }
    .errorlist { color: #b91c1c; margin: 0.25rem 0; }
    a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Create an account</h1>

    {% if messages %}
      {% for message in messages %}
        <div class="message">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="{% url 'q13_login' %}">Log in</a></p>
  </div>
</body>
</html>
