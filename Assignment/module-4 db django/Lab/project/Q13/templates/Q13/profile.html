<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Profile</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6fb; margin: 0; padding: 2rem; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
    h1 { margin-top: 0; }
    .details { margin: 1rem 0; padding: 1rem; background: #f8fafc; border-radius: 0.75rem; }
    .details dt { font-weight: 600; }
    .details dd { margin: 0 0 1rem 0; }
    a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Your Profile</h1>

    <dl class="details">
      <dt>Username</dt>
      <dd>{{ user.username }}</dd>

      <dt>Email</dt>
      <dd>{{ user.email|default:"(not provided)" }}</dd>

      <dt>Joined</dt>
      <dd>{{ user.date_joined }}</dd>
    </dl>

    <a href="{% url 'q13_logout' %}">Log out</a>
  </div>
</body>
</html>
