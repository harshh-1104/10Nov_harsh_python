{% extends 'Q12/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5 text-center border-danger">
            <div class="mb-4 text-danger">
                <i class="bi bi-exclamation-triangle-fill display-1"></i>
            </div>
            <h2 class="fw-bold mb-3">Confirm Deletion</h2>
            <p class="text-muted mb-4">Are you sure you want to delete the profile for <strong>{{ object.name }}</strong>? This action cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2 d-md-block">
                    <a href="{% url 'doctor_list' %}" class="btn btn-light px-4 me-md-2">No, Keep it</a>
                    <button type="submit" class="btn btn-danger px-4 shadow-sm">Yes, Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
{% endblock %}
