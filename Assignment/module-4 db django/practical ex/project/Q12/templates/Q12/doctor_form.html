{% extends 'Q12/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-5">
            <h2 class="fw-bold mb-4 text-dark text-center">
                {% if form.instance.pk %}Edit Profile{% else %}Add Doctor Profile{% endif %}
            </h2>
            <form method="post" class="needs-validation">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                    <a href="{% url 'doctor_list' %}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5 shadow-sm">
                        {% if form.instance.pk %}Update Profile{% else %}Save Profile{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
