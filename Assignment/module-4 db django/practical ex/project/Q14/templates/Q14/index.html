{% extends 'Q12/base.html' %}

{% block content %}
<div class="card p-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold text-dark">AJAX Doctor Management (Q14)</h2>
        <button id="add-doctor-btn" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#doctorModal">+ Add New Doctor</button>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle" id="doctor-table">
            <thead class="bg-light">
                <tr>
                    <th class="border-0">Name</th>
                    <th class="border-0">Specialization</th>
                    <th class="border-0">Hospital</th>
                    <th class="border-0">Contact</th>
                    <th class="border-0 text-center">Actions</th>
                </tr>
            </thead>
            <tbody id="doctor-tbody">
                {% include 'Q14/doctor_rows.html' %}
            </tbody>
        </table>
    </div>
</div>

<!-- Doctor Modal -->
<div class="modal fade" id="doctorModal" tabindex="-1" aria-labelledby="doctorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="doctorModalLabel">Doctor Profile</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="doctor-form">
                    {% csrf_token %}
                    <input type="hidden" name="pk" id="doctor-pk">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Name</label>
                        <input type="text" name="name" id="id_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Specialization</label>
                        <input type="text" name="specialization" id="id_specialization" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Hospital</label>
                        <input type="text" name="hospital" id="id_hospital" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contact</label>
                        <input type="text" name="contact" id="id_contact" class="form-control" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                <button type="button" id="save-doctor-btn" class="btn btn-primary px-4">Save Profile</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    // Open modal for adding
    $('#add-doctor-btn').click(function() {
        $('#doctor-form')[0].reset();
        $('#doctor-pk').val('');
        $('#doctorModalLabel').text('Add Doctor Profile');
    });

    // Open modal for editing
    $(document).on('click', '.edit-doctor', function() {
        const pk = $(this).data('pk');
        $('#doctor-pk').val(pk);
        $('#id_name').val($(this).data('name'));
        $('#id_specialization').val($(this).data('specialization'));
        $('#id_hospital').val($(this).data('hospital'));
        $('#id_contact').val($(this).data('contact'));
        $('#doctorModalLabel').text('Edit Doctor Profile');
        $('#doctorModal').modal('show');
    });

    // Save Doctor (Create/Update)
    $('#save-doctor-btn').click(function() {
        const formData = $('#doctor-form').serialize();
        $.ajax({
            url: "{% url 'save_doctor' %}",
            type: "POST",
            data: formData,
            success: function(data) {
                if (data.form_is_valid) {
                    $('#doctor-tbody').html(data.html_doctor_list);
                    $('#doctorModal').modal('hide');
                    $('#doctor-form')[0].reset();
                } else {
                    alert("Error saving doctor. Please check your input.");
                }
            }
        });
    });

    // Delete Doctor
    $(document).on('click', '.delete-doctor', function() {
        if (confirm("Are you sure you want to delete this profile?")) {
            const pk = $(this).data('pk');
            $.ajax({
                url: "{% url 'delete_doctor' %}",
                type: "POST",
                data: {
                    'pk': pk,
                    'csrfmiddlewaretoken': '{{ csrf_token }}'
                },
                success: function(data) {
                    if (data.success) {
                        $('#doctor-tbody').html(data.html_doctor_list);
                    }
                }
            });
        }
    });
});
</script>
{% endblock %}
