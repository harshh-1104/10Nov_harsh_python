{% extends 'Q12/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card p-5">
            <h2 class="fw-bold mb-4">Password Reset Confirm</h2>
            <p>Please enter your new password twice so we can verify you typed it correctly.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary shadow-sm">Change Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
