{% extends 'Q12/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5">
            <h2 class="fw-bold mb-4 text-center">Password Reset</h2>
            <p>Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary shadow-sm">Send Reset Email</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
