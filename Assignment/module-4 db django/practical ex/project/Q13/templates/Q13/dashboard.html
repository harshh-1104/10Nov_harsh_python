{% extends 'Q12/base.html' %}

{% block content %}
<div class="card p-5 text-center">
    <h2 class="fw-bold mb-4">Welcome to your Dashboard, {{ user.username }}!</h2>
    <p class="lead">You are now logged in and can manage your profile.</p>
    <div class="mt-4">
        <a href="{% url 'profile' %}" class="btn btn-outline-primary px-4 me-2">Update Profile</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-link text-decoration-none">Logout</button>
        </form>
    </div>
</div>
{% endblock %}
