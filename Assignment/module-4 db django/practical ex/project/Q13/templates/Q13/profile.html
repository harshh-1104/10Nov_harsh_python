{% extends 'Q12/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-5">
            <h2 class="fw-bold mb-4 text-center">Update Profile</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5 shadow-sm">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
